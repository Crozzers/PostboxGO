name: Test Royal Mail API Query

on:
  workflow_dispatch:
  schedule:
    # 10am on Thursdays
    - cron: 0 10 * * 4


jobs:
  test_api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run API Test
        run: |
          ./gradlew :app:testDebugUnitTest --tests "com.crozzers.postboxgo.RoyalMailAPITest"
